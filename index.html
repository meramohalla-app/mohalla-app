<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरा मोहल्ला - Mera Mohalla App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1e88e5; margin-bottom: 20px; font-size: 24px; }
        
        /* Quiz Section Styling */
        .quiz-card { background: #e3f2fd; padding: 18px; border-radius: 10px; border: 1px solid #bbdefb; margin-bottom: 20px; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: bold; }
        
        /* Progress Bar / Graph */
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 8px; overflow: hidden; height: 12px; margin-bottom: 15px; display: flex; }
        .progress-correct { background-color: #4caf50; height: 100%; width: 0%; transition: width 0.3s; }
        .progress-wrong { background-color: #f44336; height: 100%; width: 0%; transition: width 0.3s; }
        
        .stats-text { font-size: 13px; color: #555; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .question-text { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: #0d47a1; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn { background: #fff; border: 2px solid #2196f3; padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: left; }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background-color: #4caf50 !important; color: #fff; border-color: #4caf50; }
        .option-btn.wrong { background-color: #f44336 !important; color: #fff; border-color: #f44336; }
        
        /* Feedback Toast */
        .feedback-toast { display: none; text-align: center; margin-top: 10px; font-weight: bold; font-size: 15px; animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h1>📱 मेरा मोहल्ला</h1>

    <!-- QUIZ SECTION -->
    <div class="quiz-card">
        <div class="quiz-header">
            <span>🎯 आज का मुफ्त टेस्ट (Daily Quiz)</span>
            <span id="q-count">1/5</span>
        </div>

        <!-- Live Score & Graph -->
        <div class="stats-text">
            <span>सही: <b id="correct-count" style="color:green;">0</b></span>
            <span>सफलता दर: <b id="accuracy-percent">0%</b></span>
            <span>गलत: <b id="wrong-count" style="color:red;">0</b></span>
        </div>
        <div class="progress-container">
            <div id="bar-correct" class="progress-correct"></div>
            <div id="bar-wrong" class="progress-wrong"></div>
        </div>

        <!-- Question Area -->
        <div class="question-text" id="question-box">प्रश्न लोड हो रहा है...</div>

        <!-- Options -->
        <div class="options-grid" id="options-box">
            <!-- Buttons dynamically generated -->
        </div>

        <!-- Animation Feedback -->
        <div id="feedback" class="feedback-toast"></div>
    </div>
</div>

<script>
    // Audio Synthesis for "Wow!" Sound
    function playWowSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        } catch(e){}
    }

    // Quiz Questions Data
    const questions = [
        { q: "भारत की राजधानी कौन सी है?", options: ["लखनऊ", "नई दिल्ली", "मुंबई", "कोलकाता"], answer: 1 },
        { q: "उत्तर प्रदेश की राजधानी क्या है?", options: ["कानपुर", "वाराणसी", "लखनऊ", "प्रयागराज"], answer: 2 },
        { q: "भारत का राष्ट्रीय पक्षी कौन सा है?", options: ["मोर", "तोता", "कबूतर", "चील"], answer: 0 },
        { q: "हमारे देश के राष्ट्रपिता कौन हैं?", options: ["नेहरू जी", "महात्मा गांधी", "भगत सिंह", "सुभाष चंद्र बोस"], answer: 1 },
        { q: "एक सप्ताह में कितने दिन होते हैं?", options: ["5", "6", "7", "8"], answer: 2 }
    ];

    let currentQ = 0;
    let correctAns = 0;
    let wrongAns = 0;
    let canClick = true;

    function loadQuestion() {
        if(currentQ >= questions.length) {
            // Quiz Complete State
            document.getElementById("question-box").innerText = "🎉 क्विज़ पूरा हुआ!";
            document.getElementById("options-box").innerHTML = <div style='grid-column: span 2; text-align:center; font-weight:bold; padding:10px;'>आपका स्कोर: ${correctAns}/${questions.length} (${Math.round((correctAns/questions.length)*100)}%)</div>;
            document.getElementById("feedback").style.display = "none";
            return;
        }

        canClick = true;
        const qData = questions[currentQ];
        document.getElementById("q-count").innerText = ${currentQ + 1}/${questions.length};
        document.getElementById("question-box").innerText = Q. ${qData.q};
        document.getElementById("feedback").style.display = "none";

        const optionsBox = document.getElementById("options-box");
        optionsBox.innerHTML = "";

        qData.options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = (${String.fromCharCode(65 + idx)}) ${opt};
            btn.onclick = () => selectOption(idx, btn);
            optionsBox.appendChild(btn);
        });
    }

    function selectOption(selectedIdx, btnElement) {
        if(!canClick) return;
        canClick = false;

        const qData = questions[currentQ];
        const feedbackEl = document.getElementById("feedback");

        if(selectedIdx === qData.answer) {
            correctAns++;
            btnElement.classList.add("correct");
            feedbackEl.innerText = "🎉 बिल्कुल सही उत्तर! (Wow!)";
            feedbackEl.style.color = "#2e7d32";
            playWowSound();
        } else {
            wrongAns++;
            btnElement.classList.add("wrong");
            feedbackEl.innerText = "❌ गलत उत्तर!";
            feedbackEl.style.color = "#c62828";
        }

        feedbackEl.style.display = "block";
        updateStats();

        // Auto Next Question in 1.5 seconds without prompt
        setTimeout(() => {
            currentQ++;
            loadQuestion();
        }, 1500);
    }

    function updateStats() {
        const totalAttempted = correctAns + wrongAns;
        document.getElementById("correct-count").innerText = correctAns;
        document.getElementById("wrong-count").innerText = wrongAns;

        const accuracy = totalAttempted > 0 ? Math.round((correctAns / totalAttempted) * 100) : 0;
        document.getElementById("accuracy-percent").innerText = ${accuracy}%;

        // Graph updates
        const correctWidth = (correctAns / questions.length) * 100;
        const wrongWidth = (wrongAns / questions.length) * 100;

        document.getElementById("bar-correct").style.width = ${correctWidth}%;
        document.getElementById("bar-wrong").style.width = ${wrongWidth}%;
    }

    // Start Quiz
    loadQuestion();
</script>

</body>
</html>
